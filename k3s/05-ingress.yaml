apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: my-app-project
  annotations:
    # Bảo cert-manager dùng issuer đã tạo ở bước 2
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Nếu dùng K3s/Traefik thì giữ cái này
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    kubernetes.io/ingress.class: "traefik"
spec: # Thụt lề ngang hàng với metadata
  ingressClassName: traefik # Hoặc nginx tùy vào Ingress Controller bạn dùng
  tls:
    - hosts:
        - notesaides.app
        - api.notesaides.app
      secretName: notesaides-tls
  rules:
  - host: notesaides.app  # Tên miền mày tự chế [cite: 76]
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: api.notesaides.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80