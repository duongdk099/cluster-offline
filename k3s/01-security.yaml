apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: my-app-project
type: Opaque
data:
  # Password phải được mã hóa base64 (ví dụ: 'password' -> 'cGFzc3dvcmQ=')
  POSTGRES_PASSWORD: cGFzc3dvcmQ= 
  JWT_SECRET: bXktc3VwZXItc2VjcmV0  # Đây là chuỗi 'my-super-secret' đã base64
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: my-app-project
data:
  DB_HOST: postgres-service
  DB_NAME: my_database
  PORT: "3000"